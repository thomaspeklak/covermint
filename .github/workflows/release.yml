name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: covermint

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            pkg-config \
            meson \
            ninja-build \
            git \
            build-essential \
            wayland-protocols

          if apt-cache show libgtk4-layer-shell-dev >/dev/null 2>&1; then
            sudo apt-get install -y libgtk4-layer-shell-dev
          else
            echo "libgtk4-layer-shell-dev not available on this runner image; building gtk4-layer-shell from source"
            git clone --depth 1 https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
            meson setup /tmp/gtk4-layer-shell/build /tmp/gtk4-layer-shell \
              -Dexamples=false \
              -Ddocs=false \
              -Dtests=false \
              -Dsmoke-tests=false \
              -Dintrospection=false \
              -Dvapi=false
            ninja -C /tmp/gtk4-layer-shell/build
            sudo ninja -C /tmp/gtk4-layer-shell/build install
            sudo ldconfig
          fi

      - name: Build release binary
        run: cargo build --release --bin covermint --target ${{ matrix.target }}

      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/covermint-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: covermint-${{ matrix.target }}
          path: dist/covermint-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: CHANGELOG.md
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          awk "/^## \[${TAG}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md > release-notes.txt
          if [ -s release-notes.txt ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: ${{ steps.notes.outputs.found == 'true' && 'release-notes.txt' || '' }}
          generate_release_notes: ${{ steps.notes.outputs.found != 'true' }}
          token: ${{ secrets.GITHUB_TOKEN }}
